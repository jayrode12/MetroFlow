<!DOCTYPE html>
<html>
<head>
    <title>Metro Login | Mumbai Metro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(243, 244, 246, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(243, 244, 246, 0.5) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 60px;
            color: #FFD200;
            margin-bottom: 15px;
        }

        .logo-section h1 {
            color: #374151;
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .logo-section p {
            color: #6b7280;
            font-size: 14px;
        }

        .login-card {
            background: #ffffff;
            padding: 45px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-card h2 {
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 600;
        }

        .login-card p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #3b82f6;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            background: #6b7280;
            color: #ffffff;
            border: none;
            padding: 14px;
            width: 100%;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 2px 8px rgba(107, 114, 128, 0.3);
        }

        .btn:hover {
            background: #4b5563;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(75, 85, 99, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 25px;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-train"></i>
            </div>
            <h1>MUMBAI METRO</h1>
            <p>Line 1 Control Centre</p>
        </div>

        <div class="login-card">
            <h2><i class="fas fa-user-circle"></i> Manager Login</h2>
            <p>Sign in to access the control centre</p>
            
            <form method="POST">
                <div class="input-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn">
                    <i class="fas fa-sign-in-alt"></i> LOG IN
                </button>
            </form>
        </div>

        <div class="footer-text">
            <p><i class="fas fa-shield-alt"></i> Authorized Personnel Only</p>
            <p style="margin-top: 5px;">© 2024 Mumbai Metro Rail Corporation</p>
        </div>
    </div>
</body>
</html>
